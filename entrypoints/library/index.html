<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumb — Library</title>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <img src="/icon/128.png" alt="" width="34" height="34" />
          <div>
            <h1>Breadcrumb</h1>
            <p>A searchable memory of everything you learn online</p>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="note-total" class="pill">0 notes</span>
          <button id="embed-btn" class="btn-secondary" type="button">
            Build embeddings
          </button>
          <span id="embed-status" class="embed-status"></span>
        </div>
      </header>

      <div class="search-hero">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          id="search"
          type="search"
          placeholder="Search everything you've saved… e.g. kubernetes autoscaling"
          autocomplete="off"
          spellcheck="false"
        />
        <label class="hero-toggle">
          <input id="enable-semantic" type="checkbox" />
          <span>AI search</span>
        </label>
      </div>

      <div class="layout">
        <main class="main">
          <div class="main-head">
            <h2 id="view-status">All notes</h2>
            <div class="sort-wrap">
              <label for="sort">Sort</label>
              <select id="sort">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
              </select>
            </div>
          </div>

          <div id="topic-filters" class="topic-filters"></div>

          <ul id="note-list" class="note-list"></ul>
          <div id="empty" class="empty hidden"></div>
        </main>

        <aside class="sidebar">
          <section class="card">
            <h3>Learning timeline</h3>
            <div id="timeline" class="timeline"></div>
          </section>

          <section class="card">
            <h3>Top topics</h3>
            <div id="top-topics" class="top-topics"></div>
          </section>

          <section class="card danger-card">
            <h3>Your data</h3>
            <p class="card-note">
              Everything lives in this browser only. Nothing is uploaded.
            </p>
            <div class="card-actions">
              <button id="export-btn" class="btn-secondary" type="button">
                Export JSON
              </button>
              <button id="clear-btn" class="btn-danger" type="button">
                Clear all
              </button>
            </div>
          </section>
        </aside>
      </div>
    </div>

    <dialog id="similar-dialog" class="dialog">
      <div class="dialog-head">
        <h3>Similar notes</h3>
        <button id="similar-close" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>
      <p id="similar-source" class="dialog-source"></p>
      <ul id="similar-list" class="note-list"></ul>
      <p id="similar-empty" class="empty hidden">No similar notes yet.</p>
    </dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
