name: Assign reviewer

# When a pull request is opened, put a maintainer on it to review.
# Skips draft PRs until the author marks them ready for review.
#
# Using `pull_request_target` (instead of `pull_request`) runs this with the
# base repository's token, so it can assign reviewers even on PRs from forks.
# This workflow only calls the GitHub API — it does not check out PR code.
# Note: this file must exist on the default branch (master) to take effect.
on:
  pull_request_target:
    branches: [master]
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request maintainer review
        uses: actions/github-script@v7
        env:
          # Comma-separated GitHub usernames. Add maintainers here.
          MAINTAINERS: "prazian"
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const { owner, repo } = context.repo;

            const maintainers = (process.env.MAINTAINERS || '')
              .split(',').map((s) => s.trim()).filter(Boolean);
            if (maintainers.length === 0) {
              core.warning('No maintainers configured in MAINTAINERS.');
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: prNumber, assignees: maintainers,
              });
              core.info(`Assigned: ${maintainers.join(', ')}`);
            } catch (e) {
              core.warning(`Could not assign: ${e.message}`);
            }

            const requested = new Set((pr.requested_reviewers || []).map((u) => u.login));
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: prNumber,
            });
            const reviewed = new Set(reviews.map((r) => r.user?.login));
            const toRequest = maintainers.filter(
              (m) => m !== pr.user.login && !requested.has(m) && !reviewed.has(m),
            );

            if (toRequest.length === 0) {
              core.info(
                'No new reviewers to request (author is the only maintainer, or they were already requested/have reviewed).',
              );
              return;
            }
            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: prNumber, reviewers: toRequest,
              });
              core.info(`Requested review from: ${toRequest.join(', ')}`);
            } catch (e) {
              core.warning(`Could not request review: ${e.message}`);
            }
